name: Security checks

on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2" "setuptools>=78.1.1"
          python -m pip install -r requirements.txt -r requirements-build.txt pip-audit
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: Audit dependencies
        run: pip-audit -r requirements.txt -r requirements-build.txt
